name: PHPUnit

on:
  pull_request:
  workflow_run:
    workflows: ["🐳 Build & publish app image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (e.g. 2026.2.8, ci, test)"
        required: true
        default: latest
jobs:
  phpunit:
    runs-on: ubuntu-latest
    # Only run if workflow_run was successful or if triggered by other events
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Determine ref and tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "REF=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Use the exact commit and tag from the workflow_run event
            echo "REF=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
            echo "TAG=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          else
            # Pull request or other events
            echo "REF=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.REF }}

      - name: Set up test directories
        run: |
          mkdir -p /tmp/tests/coverage/html
          chmod -R 777 /tmp/tests || true

      - name: Run PHPUnit tests
        run: |
          docker run --rm \
            -v $(pwd)/webapp:/miserend/webapp \
            -v /miserend/webapp/vendor \
            -v /tmp/tests:/miserend/webapp/fajlok/tmp/tests \
            -w /miserend/webapp/tests \
            --entrypoint /miserend/webapp/vendor/bin/phpunit \
            ghcr.io/szentjozsefhackathon/miserend.hu-coverage:${{ steps.tag.outputs.TAG }} \
            -c phpunit.xml \
            --coverage-html /miserend/webapp/fajlok/tmp/tests/coverage/html \
            --log-junit /miserend/webapp/fajlok/tmp/tests/junit.xml \
            --coverage-cobertura /miserend/webapp/fajlok/tmp/tests/coverage/cobertura.xml

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage-html
          path: /tmp/tests/coverage/html
          if-no-files-found: error

      - name: Upload cobertura XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage-cobertura
          path: /tmp/tests/coverage/cobertura.xml
          if-no-files-found: error

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: /tmp/tests/junit.xml
          fail_on_failure: false
          detailed_summary: true
          include_passed: false
          annotate_only: true
          check_name: PHPUnit Test Results
          job_name: PHPUnit
