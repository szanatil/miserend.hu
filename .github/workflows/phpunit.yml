name: PHPUnit

on:
  pull_request:
  workflow_run:
    workflows: ["🐳 Build & publish app image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (e.g. 2026.2.8, ci, test)"
        required: true
        default: latest
jobs:
  phpunit:
    runs-on: ubuntu-latest
    # Only run if workflow_run was successful or if triggered by other events
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Determine ref and tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "REF=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Use the exact commit and tag from the workflow_run event
            echo "REF=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
            echo "TAG=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          else
            # Pull request or other events
            echo "REF=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.REF }}

      - name: Set up test directories
        run: |
          mkdir -p "${{ github.workspace }}/test-results/coverage/html"
          chmod -R 777 "${{ github.workspace }}/test-results" || true

      - name: Run PHPUnit tests
        run: |
          docker run --rm \
            -v $(pwd)/webapp:/miserend/webapp \
            -v /miserend/webapp/vendor \
            -v "${{ github.workspace }}/test-results:/miserend/test-results" \
            -w /miserend/webapp/tests \
            --entrypoint /miserend/webapp/vendor/bin/phpunit \
            ghcr.io/szentjozsefhackathon/miserend.hu-coverage:${{ steps.tag.outputs.TAG }} \
            -c phpunit.xml \
            --coverage-html /miserend/test-results/coverage/html \
            --log-junit /miserend/test-results/unit-junit.xml \
            --coverage-cobertura /miserend/test-results/coverage/cobertura.xml

      - name: Start application stack
        run: |
          docker compose -f docker/compose.yml -f docker/compose.dev.yml up -d

      - name: Wait for application
        run: |
          timeout 120 bash -c 'until curl -fsS http://127.0.0.1:8000/ > /dev/null; do sleep 2; done'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Verify browser tooling
        run: |
          command -v google-chrome || command -v chromium || command -v chromium-browser
          command -v chromedriver

      - name: Install functional test dependencies
        working-directory: webapp
        env:
          COMPOSER_VENDOR_DIR: ${{ github.workspace }}/test-results/functional-vendor
        run: |
          mkdir -p "${COMPOSER_VENDOR_DIR}"
          if grep -q '"symfony/panther"' composer.lock; then
            composer install --no-interaction --prefer-dist
          else
            composer update --no-interaction --prefer-dist symfony/panther --with-all-dependencies
          fi

      - name: Run functional tests
        working-directory: webapp/tests
        env:
          PANTHER_EXTERNAL_BASE_URI: http://127.0.0.1:8000
          PANTHER_NO_SANDBOX: 1
          FUNCTIONAL_VENDOR_AUTOLOAD: ${{ github.workspace }}/test-results/functional-vendor/autoload.php
        run: |
          export PANTHER_CHROME_BINARY="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          "${{ github.workspace }}/test-results/functional-vendor/bin/phpunit" \
            -c phpunit.functional.xml \
            --log-junit "${{ github.workspace }}/test-results/functional-junit.xml"

      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker compose -f docker/compose.yml -f docker/compose.dev.yml logs

      - name: Stop application stack
        if: always()
        run: |
          docker compose -f docker/compose.yml -f docker/compose.dev.yml down -v

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage-html
          path: ${{ github.workspace }}/test-results/coverage/html
          if-no-files-found: error

      - name: Upload cobertura XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-coverage-cobertura
          path: ${{ github.workspace }}/test-results/coverage/cobertura.xml
          if-no-files-found: error

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: |
            ${{ github.workspace }}/test-results/unit-junit.xml
            ${{ github.workspace }}/test-results/functional-junit.xml
          fail_on_failure: false
          detailed_summary: true
          include_passed: false
          annotate_only: true
          check_name: All Test Results
          job_name: Tests
