services:
  npm-init:
    image: node:18
    volumes:
      - ../webapp:/webapp
      - node_modules_data:/webapp/node_modules
    working_dir: /webapp
    command: npm install
    restart: "no"
  mailcatcher:
    image: dockage/mailcatcher
    container_name: mailcatcher
    ports:
      - 11025:1025
      - 11080:1080
    restart: on-failure:10
    networks:
      inner:
        aliases:
          - mailcatcher
  miserend:
    depends_on:
      npm-init:
        condition: service_completed_successfully
    environment:
      - SMTP_HOST=mailcatcher
      - SMTP_PORT=1025
      - MISEREND_WEBAPP_ENVIRONMENT=development
    volumes:
      - ../webapp:/miserend/webapp
      - vendor_data:/miserend/webapp/vendor
      - node_modules_data:/miserend/webapp/node_modules
volumes:
  vendor_data:
  node_modules_data: