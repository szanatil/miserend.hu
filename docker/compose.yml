services:
  tmp-init:
    image: busybox
    volumes:
      - tmp:/data
    command: sh -c "chown -R 33:33 /data"
    restart: "no"
  data-init:
    image: ghcr.io/szentjozsefhackathon/miserend-elasticsearch-data:2026.4.18
    volumes:
      - elasticsearch_data:/data
    restart: "no"
  mysql:
    image: mariadb:12
    container_name: mysql
    platform: linux/amd64
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/initdb.d:/docker-entrypoint-initdb.d
      - ./mysql/mysql.conf.d:/etc/mysql/mysql.conf.d
    ports:
      - 3306:3306
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pw
      MYSQL_DATABASE: miserend
    healthcheck:
      test: [CMD, mariadb-admin, ping, -h, localhost, -u, user, -ppw]
      timeout: 5s
      retries: 10
    networks:
      inner:
        aliases:
          - mysql
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.1
    container_name: elasticsearch
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["eswrapper"]
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - cluster.name=miserend
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
      - 9300:9300
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/entrypoint.sh:/entrypoint-wrapper.sh:ro
    networks:
      inner:
        aliases:
          - elasticsearch
  miserend:
    container_name: miserend
    image: ghcr.io/szentjozsefhackathon/miserend.hu:v2026.05.17
    volumes: 
       - tmp:/miserend/webapp/fajlok/tmp
       - ./miserend/apache/ports.conf:/etc/apache2/ports.conf
    ports:
      - 8000:8000
    user: "www-data"
    restart: "always"
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    environment: 
      - MISEREND_WEBAPP_ENVIRONMENT=production

    networks:
      inner:
        aliases:
          - miserend
networks:
  inner:
    driver: bridge
volumes:
  db_data: {}
  elasticsearch_data: {}
  tmp: {}
