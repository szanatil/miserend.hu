<mat-card class="delete-period-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title class="title-row">
      <mat-icon fontSet="material-symbols-outlined" class="bold-icon">delete_outline</mat-icon>
      <span>{{ 'DELETE_PERIOD_TITLE' | translate }}</span>
    </mat-card-title>
    <button mat-icon-button mat-dialog-close class="dialog-header-close">
      <mat-icon>close</mat-icon>
    </button>
  </mat-card-header>
  <mat-card-content>

    <div class="period-info">
      <div class="period-name-row">
        <ng-container *ngIf="periodColor; else noColorBadge">
          <span class="period-color-badge" [style.backgroundColor]="periodColor">
          </span>
        </ng-container>
        <ng-template #noColorBadge>
          <span class="period-color-badge" style="background-color: #ccc;">
          </span>
        </ng-template>
        <span class="period-name bold-text">{{ data.period.name }}</span>
      </div>

      <div class="period-range-row">
        <span class="period-range" *ngIf="periodRangeInfo">{{ periodRangeInfo }}</span>
      </div>

      <div class="warning-message">
        <p>{{ 'DELETE_PERIOD_WARNING' | translate: {count: data.massCount} }}</p>
      </div>
    </div>

  </mat-card-content>
  <mat-card-actions class="actions-row">
    <button mat-flat-button (click)="onConfirmDelete()" color="warn" class="bold-text">
      {{ 'DELETE' | translate }}
    </button>
    <button mat-flat-button mat-dialog-close class="bold-text">
      {{ 'CANCEL' | translate }}
    </button>
  </mat-card-actions>
</mat-card>
